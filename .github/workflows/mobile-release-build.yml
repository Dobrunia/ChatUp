name: Mobile Release Build

on:
  push:
    branches:
      - release
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-release-version:
    runs-on: ubuntu-latest
    outputs:
      version_changed: ${{ steps.version.outputs.changed }}
      current_version: ${{ steps.version.outputs.current }}
      previous_version: ${{ steps.version.outputs.previous }}
      android_exists: ${{ steps.platforms.outputs.android_exists }}
      ios_exists: ${{ steps.platforms.outputs.ios_exists }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check frontend version change
        id: version
        shell: bash
        run: |
          set -euo pipefail
          CURRENT_VERSION="$(node -p "require('./frontend/package.json').version")"
          PREVIOUS_VERSION=""

          if git rev-parse --verify HEAD^ >/dev/null 2>&1; then
            if git show HEAD^:frontend/package.json >/tmp/prev_frontend_package.json 2>/dev/null; then
              PREVIOUS_VERSION="$(node -p "require('/tmp/prev_frontend_package.json').version || ''")"
            fi
          fi

          if [[ -n "$PREVIOUS_VERSION" && "$CURRENT_VERSION" == "$PREVIOUS_VERSION" ]]; then
            CHANGED="false"
          else
            CHANGED="true"
          fi

          echo "current=$CURRENT_VERSION" >> "$GITHUB_OUTPUT"
          echo "previous=$PREVIOUS_VERSION" >> "$GITHUB_OUTPUT"
          echo "changed=$CHANGED" >> "$GITHUB_OUTPUT"

      - name: Detect mobile platform projects
        id: platforms
        shell: bash
        run: |
          set -euo pipefail
          ANDROID_EXISTS="false"
          IOS_EXISTS="false"

          if [[ -d "android" || -d "frontend/android" ]]; then
            ANDROID_EXISTS="true"
          fi
          if [[ -d "ios" || -d "frontend/ios" ]]; then
            IOS_EXISTS="true"
          fi

          echo "android_exists=$ANDROID_EXISTS" >> "$GITHUB_OUTPUT"
          echo "ios_exists=$IOS_EXISTS" >> "$GITHUB_OUTPUT"

  build-android:
    needs: check-release-version
    if: needs.check-release-version.outputs.version_changed == 'true' && needs.check-release-version.outputs.android_exists == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build -w frontend

      - name: Sync Capacitor Android project
        run: npx cap sync android
        working-directory: frontend

      - name: Validate Android signing secrets
        shell: bash
        run: |
          set -euo pipefail
          missing=0
          for name in KEYSTORE_FILE KEYSTORE_PASSWORD KEY_ALIAS KEY_PASSWORD; do
            if [[ -z "${!name:-}" ]]; then
              echo "::error::Missing required secret: $name"
              missing=1
            fi
          done
          if [[ "$missing" -ne 0 ]]; then
            exit 1
          fi
        env:
          KEYSTORE_FILE: ${{ secrets.KEYSTORE_FILE }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Decode Android release keystore
        shell: bash
        run: |
          set -euo pipefail
          echo "${{ secrets.KEYSTORE_FILE }}" | base64 --decode > frontend/android/chatup-release.keystore

      - name: Make gradlew executable
        run: chmod +x frontend/android/gradlew

      - name: Build Android release artifact
        env:
          KEYSTORE_FILE: ${{ github.workspace }}/frontend/android/chatup-release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          cd frontend/android
          ./gradlew assembleRelease

      - name: Verify Android APK signature
        shell: bash
        run: |
          set -euo pipefail
          APK=$(ls frontend/android/app/build/outputs/apk/release/*.apk | head -n 1)
          echo "APK: $APK"
          jarsigner -verify -verbose -certs "$APK" | tail -n 30

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-release-${{ needs.check-release-version.outputs.current_version }}
          path: |
            frontend/android/app/build/outputs/apk/release/*.apk
            frontend/android/app/build/outputs/bundle/release/*.aab
          if-no-files-found: warn

  build-ios:
    needs: check-release-version
    if: needs.check-release-version.outputs.version_changed == 'true' && needs.check-release-version.outputs.ios_exists == 'true'
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build -w frontend

      - name: Sync Capacitor iOS project
        run: npx cap sync ios
        working-directory: frontend

      - name: Build iOS archive (unsigned)
        run: |
          xcodebuild \
            -workspace frontend/ios/App/App.xcworkspace \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -archivePath frontend/ios/build/App.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            archive

      - name: Upload iOS archive
        uses: actions/upload-artifact@v4
        with:
          name: ios-archive-${{ needs.check-release-version.outputs.current_version }}
          path: frontend/ios/build/App.xcarchive
          if-no-files-found: warn

  create-github-release:
    needs:
      - check-release-version
      - build-android
      - build-ios
    if: needs.check-release-version.outputs.version_changed == 'true' && (needs.build-android.result == 'success' || needs.build-android.result == 'skipped') && (needs.build-ios.result == 'success' || needs.build-ios.result == 'skipped')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Android artifacts
        if: needs.build-android.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: android-release-${{ needs.check-release-version.outputs.current_version }}
          path: release-assets/android

      - name: Download iOS artifacts
        if: needs.build-ios.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: ios-archive-${{ needs.check-release-version.outputs.current_version }}
          path: release-assets/ios

      - name: Pack iOS archive into single file
        if: needs.build-ios.result == 'success'
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ needs.check-release-version.outputs.current_version }}"
          mkdir -p release-assets/ios-packed
          (cd release-assets/ios && zip -r "../ios-packed/chatup-ios-${VERSION}.xcarchive.zip" .)

      - name: Create release manifest (for in-app update checks)
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ needs.check-release-version.outputs.current_version }}"
          TAG="v${VERSION}"
          SHA="${{ github.sha }}"
          DATE="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"

          mkdir -p release-assets/meta

          cat > release-assets/meta/release.json <<EOF
          {
            "app": "ChatUp",
            "version": "${VERSION}",
            "tag": "${TAG}",
            "commit": "${SHA}",
            "publishedAt": "${DATE}"
          }
          EOF

          echo "${VERSION}" > release-assets/meta/version.txt

      - name: Create or update GitHub release
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="v${{ needs.check-release-version.outputs.current_version }}"
          TITLE="ChatUp ${TAG}"
          NOTES="Automated mobile build for ${TAG}"

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" --title "$TITLE" --notes "$NOTES"
          else
            gh release create "$TAG" --title "$TITLE" --notes "$NOTES"
          fi

      - name: Upload release assets
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="v${{ needs.check-release-version.outputs.current_version }}"
          VERSION="${{ needs.check-release-version.outputs.current_version }}"

          shopt -s nullglob globstar
          assets=(release-assets/android/**/*.apk release-assets/android/**/*.aab)

          if [[ -f "release-assets/ios-packed/chatup-ios-${VERSION}.xcarchive.zip" ]]; then
            assets+=("release-assets/ios-packed/chatup-ios-${VERSION}.xcarchive.zip")
          fi

          assets+=("release-assets/meta/release.json" "release-assets/meta/version.txt")

          if [[ ${#assets[@]} -eq 0 ]]; then
            echo "No release assets found."
            exit 0
          fi

          gh release upload "$TAG" "${assets[@]}" --clobber

  release-build-skip-info:
    needs: check-release-version
    if: needs.check-release-version.outputs.version_changed != 'true' || (needs.check-release-version.outputs.android_exists != 'true' && needs.check-release-version.outputs.ios_exists != 'true')
    runs-on: ubuntu-latest
    steps:
      - name: Explain skip reason
        run: |
          echo "Frontend version changed: ${{ needs.check-release-version.outputs.version_changed }}"
          echo "Current version: ${{ needs.check-release-version.outputs.current_version }}"
          echo "Previous version: ${{ needs.check-release-version.outputs.previous_version }}"
          echo "Android project exists: ${{ needs.check-release-version.outputs.android_exists }}"
          echo "iOS project exists: ${{ needs.check-release-version.outputs.ios_exists }}"
          echo "Mobile build jobs skipped."