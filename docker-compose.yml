version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: chatup-mysql
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: chatup_dev
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    # Use native password for easier local connection without advanced auth setups
    command: --default-authentication-plugin=mysql_native_password

volumes:
  mysql_data: